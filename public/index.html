<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Scribe - Stream & Download</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #070707;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #282828;
        }
        header h1 {
            color: #1DB954;
            margin: 0;
            font-size: 2.2rem;
        }
        header p {
            color: #b3b3b3;
            margin: 5px 0 0 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        .track-card {
            background-color: #181818;
            border-radius: 8px;
            padding: 16px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            border: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }
        .track-card:hover {
            background-color: #282828;
            transform: translateY(-5px);
        }
        .cover-frame {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Keeps it a perfect square */
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #2a2a2a;
        }
        .cover-frame img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .track-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin: 0 0 15px 0;
        }
        .action-row {
            margin-top: auto;
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .btn-play {
            background-color: #1DB954;
            color: #ffffff;
        }
        .btn-play:hover { background-color: #1ed760; }
        .btn-download {
            background-color: #333333;
            color: #ffffff;
        }
        .btn-download:hover { background-color: #444444; }
        
        /* Audio Player Bar */
        .player-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: #181818;
            border-top: 1px solid #282828;
            padding: 15px 20px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .player-footer audio {
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <header>
        <h1>SOUND SCRIBE</h1>
        <p>Stream and download your favorite tracks freely</p>
    </header>

    <div class="container">
        <div class="library-grid" id="music-grid">
            </div>
    </div>

    <div class="player-footer" id="audioPlayerContainer">
        <audio id="mainAudioPlayer" controls autoplay></audio>
    </div>

    <script>
        // Immediately fetch library elements on screen load
        window.onload = loadMusicLibrary;

        async function loadMusicLibrary() {
            const grid = document.getElementById('music-grid');
            try {
                const response = await fetch('/api/songs');
                const songs = await response.json();

                if (songs.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #b3b3b3;">No music files found in the archive. Check back later!</p>`;
                    return;
                }

                grid.innerHTML = ''; // Wipe loading state
                songs.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'track-card';
                    card.innerHTML = `
                        <div class="cover-frame">
                            <img src="${song.coverUrl}" alt="Cover Art" onerror="this.src='https://via.placeholder.com/200?text=No+Cover'">
                        </div>
                        <p class="track-title" title="${song.title}">${song.title}</p>
                        <p class="track-artist">${song.artist}</p>
                        <div class="action-row">
                            <button class="btn btn-play" onclick="playSong('${song.audioUrl}')">▶ Play</button>
                            <a class="btn btn-download" href="/api/songs/download/${song._id}" target="_blank">💾 Save</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #ff5555;">Could not sync tracking interface with database server.</p>`;
            }
        }

        function playSong(audioUrl) {
            const playerContainer = document.getElementById('audioPlayerContainer');
            const player = document.getElementById('mainAudioPlayer');
            
            player.src = audioUrl;
            playerContainer.style.display = 'flex';
            player.play().catch(err => console.log("Playback initialized, click interface context manually."));
        }
    </script>
</body>
</html>
