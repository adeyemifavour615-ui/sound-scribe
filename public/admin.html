<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - Admin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; box-sizing: border-box;
        }
        .container { max-width: 600px; width: 100%; display: none; margin: auto; }
        
        /* Custom UI Login Gate Box */
        .login-gate {
            background-color: rgba(24, 24, 24, 0.95);
            padding: 40px; border-radius: 12px; border: 1px solid #333;
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .box {
            background-color: rgba(24, 24, 24, 0.9);
            padding: 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 30px;
            border: 1px solid #282828;
        }
        h1, h2 { color: #1DB954; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #b3b3b3; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; background-color: #282828;
            border: 1px solid #3e3e3e; border-radius: 4px; color: white; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #1DB954; }
        button {
            width: 100%; background-color: #1DB954; color: white; border: none;
            padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        button:hover { background-color: #1ed760; }
        .message { text-align: center; margin-top: 15px; font-weight: bold; }
        .nav-link { display: block; text-align: center; margin-top: 20px; color: #b3b3b3; text-decoration: none; }
        .nav-link:hover { color: #ffffff; }
        
        .song-item {
            background-color: #181818; padding: 12px; border-radius: 6px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #282828;
        }
        .btn-delete { background-color: #ff5555; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete:hover { background-color: #ff3333; }
    </style>
</head>
<body>

    <div class="login-gate" id="authBox">
        <h1>Admin Vault</h1>
        <p style="color:#b3b3b3; margin-bottom:25px;">Provide access credentials to configure systems</p>
        <div class="form-group">
            <label>Master Security Key</label>
            <input type="password" id="secretField" placeholder="••••••••">
        </div>
        <button onclick="checkAccess()">Authorize Entry</button>
        <a href="/" class="nav-link">Cancel</a>
    </div>

    <div class="container" id="dashView">
        <div class="box">
            <h1>Upload Track Meta</h1>
            <form id="songForm">
                <div class="form-group">
                    <label for="title">Song Title *</label>
                    <input type="text" id="title" required placeholder="e.g., Midnight City">
                </div>
                <div class="form-group">
                    <label for="artist">Artist Name</label>
                    <input type="text" id="artist" placeholder="e.g., M83">
                </div>
                <div class="form-group">
                    <label for="audioUrl">Audio File URL (Direct MP3 Link) *</label>
                    <input type="url" id="audioUrl" required placeholder="https://example.com/song.mp3">
                </div>
                <div class="form-group">
                    <label for="coverUrl">Cover Art Image URL</label>
                    <input type="url" id="coverUrl" placeholder="https://example.com/cover.jpg">
                </div>
                <button type="submit">Add Song to Platform</button>
            </form>
            <div class="message" id="msg"></div>
        </div>

        <div class="box">
            <h2>Manage Live Library</h2>
            <div id="admin-song-list">Loading database entries...</div>
        </div>

        <a href="/" class="nav-link">← Go to Music Library</a>
    </div>

    <script>
        function checkAccess() {
            const entry = document.getElementById('secretField').value;
            // Your access key remains "admin123"
            if (entry === "admin123") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('dashView').style.display = 'block';
                fetchAdminLibrary();
            } else {
                alert("Authorization Denied: Security signature mismatch.");
            }
        }

        async function fetchAdminLibrary() {
            try {
                const response = await fetch('/api/songs');
                const songs = await response.json();
                const listContainer = document.getElementById('admin-song-list');
                
                if (songs.length === 0) {
                    listContainer.innerHTML = '<p style="color:#b3b3b3; text-align:center;">No songs currently in MongoDB.</p>';
                    return;
                }

                listContainer.innerHTML = '';
                songs.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerHTML = `
                        <div>
                            <strong>${song.title}</strong> - <span style="color:#b3b3b3;">${song.artist}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteSong('${song._id}')">Delete</button>
                    `;
                    listContainer.appendChild(div);
                });
            } catch (err) {
                document.getElementById('admin-song-list').innerText = "Failed to synchronize current inventory list.";
            }
        }

        async function deleteSong(songId) {
            if (!confirm("Are you completely sure?")) return;
            const response = await fetch(`/api/songs/${songId}`, { method: 'DELETE' });
            if (response.ok) { alert("Track deleted!"); fetchAdminLibrary(); }
        }

        document.getElementById('songForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('msg');
            const songData = {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                audioUrl: document.getElementById('audioUrl').value,
                coverUrl: document.getElementById('coverUrl').value
            };

            const response = await fetch('/api/songs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(songData)
            });

            if (response.ok) {
                msgDiv.style.color = '#1DB954';
                msgDiv.innerText = "Success: Track uploaded!";
                document.getElementById('songForm').reset();
                fetchAdminLibrary();
            } else {
                msgDiv.style.color = '#ff5555';
                msgDiv.innerText = "Error uploading tracking configuration.";
            }
        });
    </script>
</body>
</html>
