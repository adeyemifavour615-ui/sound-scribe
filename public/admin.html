<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Scribe - Admin Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)), 
                        url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1200') no-repeat center center fixed;
            background-size: cover; color: #ffffff; margin: 0; padding: 16px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; box-sizing: border-box;
        }
        .container { max-width: 600px; width: 100%; display: none; }
        .login-gate {
            background-color: #141414; padding: 30px; border-radius: 12px; border: 1px solid #222;
            max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .box { background-color: #111; padding: 24px; border-radius: 8px; border: 1px solid #222; margin-bottom: 24px; }
        h1, h2 { color: #ffa500; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #b3b3b3; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 12px; background-color: #181818; border: 1px solid #222;
            border-radius: 6px; color: white; box-sizing: border-box; font-size: 0.95rem;
        }
        input:focus, select:focus { outline: none; border-color: #ffa500; }
        button {
            width: 100%; background-color: #ffa500; color: black; border: none;
            padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .nav-link { display: block; text-align: center; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: white; }
        .song-item {
            background-color: #161616; padding: 12px; border-radius: 6px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222;
        }
        .btn-delete { background-color: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tag { font-size: 0.75rem; background-color: #222; color: #ffa500; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="login-gate" id="authBox">
        <h1>Admin Vault</h1>
        <div class="form-group" style="text-align: left;">
            <label>Master Security Key</label>
            <input type="password" id="secretField" placeholder="••••••••">
        </div>
        <button onclick="checkAccess()">Authorize Entry</button>
        <a href="/" class="nav-link">Cancel</a>
    </div>

    <div class="container" id="dashView">
        <div class="box">
            <h1>Upload Track Meta</h1>
            <form id="songForm">
                <div class="form-group"><label>Song Title *</label><input type="text" id="title" required></div>
                <div class="form-group"><label>Artist Name</label><input type="text" id="artist"></div>
                <div class="form-group">
                    <label>Select Genre *</label>
                    <select id="genre">
                        <option value="Afrosounds">Afrosounds</option>
                        <option value="Hip-Hop/Rap">Hip-Hop/Rap</option>
                        <option value="Latin">Latin</option>
                        <option value="Jazz/Blues">Jazz/Blues</option>
                        <option value="Pop">Pop</option>
                        <option value="R&B">R&B</option>
                    </select>
                </div>
                <div class="form-group"><label>Audio URL (Direct MP3 Link) *</label><input type="url" id="audioUrl" required></div>
                <div class="form-group"><label>Cover Art Image URL</label><input type="url" id="coverUrl"></div>
                <button type="submit">Add Song to Platform</button>
            </form>
            <div id="msg" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        </div>

        <div class="box">
            <h2>Manage Live Library</h2>
            <div id="admin-song-list">Syncing data configuration structures...</div>
        </div>
        <a href="/" class="nav-link">← Go to Music Library</a>
    </div>

    <script>
        function checkAccess() {
            if (document.getElementById('secretField').value === "admin123") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('dashView').style.display = 'block';
                fetchAdminLibrary();
            } else { alert("Authorization Denied."); }
        }

        async function fetchAdminLibrary() {
            const response = await fetch('/api/songs');
            const songs = await response.json();
            const list = document.getElementById('admin-song-list');
            list.innerHTML = songs.length === 0 ? '<p>No items in cloud database collections.</p>' : '';
            songs.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div><strong>${song.title}</strong> - ${song.artist}<span class="tag">${song.genre}</span></div>
                                 <button class="btn-delete" onclick="deleteSong('${song._id}')">Delete</button>`;
                list.appendChild(div);
            });
        }

        async function deleteSong(id) {
            if (confirm("Delete track item?")) {
                await fetch(`/api/songs/${id}`, { method: 'DELETE' });
                fetchAdminLibrary();
            }
        }

        document.getElementById('songForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const songData = {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                genre: document.getElementById('genre').value,
                audioUrl: document.getElementById('audioUrl').value,
                coverUrl: document.getElementById('coverUrl').value
            };
            const response = await fetch('/api/songs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(songData)
            });
            if (response.ok) {
                document.getElementById('msg').innerText = "Track Uploaded Successfully!";
                document.getElementById('songForm').reset();
                fetchAdminLibrary();
            }
        });
    </script>
</body>
</html>
